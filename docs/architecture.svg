<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 985" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1200" height="985" fill="#f8fafc"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker>
    <marker id="arrg" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#4f46e5"/></marker>
    <marker id="arrp" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#db2777"/></marker>
    <marker id="arrm" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#b45309"/></marker>
  </defs>

  <text x="600" y="40" text-anchor="middle" font-size="25" font-weight="700" fill="#0f172a">Compass-BlackBox IQ — F.A.M. grounding + the competence engine</text>
  <text x="600" y="65" text-anchor="middle" font-size="13.5" fill="#475569">Microsoft governs permissions, actions &amp; grounding · Compass-BlackBox IQ governs memory &amp; competence</text>

  <!-- ============ F.A.M. — grounded truth ============ -->
  <rect x="50" y="86" width="1100" height="196" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="74" y="114" font-size="16" font-weight="700" fill="#3730a3">F.A.M. — grounded truth</text>
  <text x="280" y="114" font-size="12.5" fill="#4338ca">read-only grounding · rented from Microsoft · the agent never writes it</text>

  <rect x="72" y="128" width="340" height="118" rx="8" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="90" y="153" font-size="13.5" font-weight="700" fill="#312e81">Foundry IQ</text>
  <text x="388" y="153" text-anchor="end" font-size="11.5" font-weight="700" fill="#6366f1">FACTS</text>
  <text x="90" y="176" font-size="11" fill="#4f46e5">institutional reference — who / what</text>
  <text x="90" y="194" font-size="11" fill="#4f46e5">vendor master · org directory · handbook</text>
  <text x="90" y="216" font-size="10.5" fill="#6366f1">[iq:] · retrieval over documents</text>
  <text x="90" y="234" font-size="10.5" fill="#16a34a">Azure AI Search KB · LIVE</text>

  <rect x="430" y="128" width="340" height="118" rx="8" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="448" y="153" font-size="13.5" font-weight="700" fill="#312e81">Work IQ</text>
  <text x="746" y="153" text-anchor="end" font-size="11.5" font-weight="700" fill="#6366f1">ACTIVITY</text>
  <text x="448" y="176" font-size="11" fill="#4f46e5">live Microsoft 365 — what's happening now</text>
  <text x="448" y="194" font-size="11" fill="#4f46e5">people · meetings · mail, this week</text>
  <text x="448" y="216" font-size="10.5" fill="#6366f1">[work:] · user-scoped, permission-aware</text>
  <text x="448" y="234" font-size="10.5" fill="#16a34a">Work IQ Gateway (REST / A2A) · LIVE</text>

  <rect x="788" y="128" width="340" height="118" rx="8" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="806" y="153" font-size="13.5" font-weight="700" fill="#312e81">Fabric IQ</text>
  <text x="1104" y="153" text-anchor="end" font-size="11.5" font-weight="700" fill="#6366f1">MEANING</text>
  <text x="806" y="176" font-size="11" fill="#4f46e5">ontology / knowledge graph — how things relate</text>
  <text x="806" y="194" font-size="11" fill="#4f46e5">net-60 is-a deviation → requires approval</text>
  <text x="806" y="216" font-size="10.5" fill="#6366f1">[fabric:] · modeled relationships, not a lookup</text>
  <text x="806" y="234" font-size="10.5" fill="#b45309">Fabric IQ ontology (RDF / OWL) · ROADMAP</text>

  <text x="74" y="268" font-size="12" font-weight="600" fill="#3730a3">Facts + Activity + Meaning = the complete grounded world</text>
  <text x="486" y="268" font-size="11.5" fill="#4338ca">· source-tagged · each earns a distinct citation · never merged into governed memory</text>

  <!-- grounds -->
  <path d="M600,282 L600,322" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="610" y="306" font-size="11" fill="#4f46e5">grounds (read-only) → [iq] [work] [fabric]</text>

  <!-- ============ GM Louis (agent) ============ -->
  <rect x="50" y="324" width="1100" height="86" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="74" y="352" font-size="16" font-weight="700" fill="#065f46">GM Louis — Microsoft Foundry agent</text>
  <text x="430" y="352" font-size="12" fill="#047857">multi-step reasoning over F.A.M. grounding + governed memory, via MCP</text>
  <text x="74" y="376" font-size="11.5" fill="#059669">plan → recall → ground → act → log · honest citations (empty when it freelanced)</text>
  <text x="74" y="396" font-size="11.5" fill="#059669">every action produces one decision record</text>

  <!-- seam: rented vs owned -->
  <path d="M50,424 L1150,424" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5 5"/>
  <text x="74" y="419" font-size="11" font-weight="600" fill="#6366f1">▲ grounding — rented · read-only</text>
  <text x="1126" y="419" text-anchor="end" font-size="11" font-weight="600" fill="#b45309">governed memory — owned · revertible ▼</text>
  <path d="M600,410 L600,452" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="610" y="440" font-size="11" fill="#64748b">acts · logs</text>

  <!-- ============ BlackBox IQ (GGR) — governed memory + engine ============ -->
  <rect x="50" y="454" width="950" height="476" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="74" y="482" font-size="16" font-weight="700" fill="#92400e">BlackBox IQ (GGR) — governed memory + the competence engine</text>

  <!-- Vault -->
  <rect x="70" y="496" width="252" height="244" rx="8" fill="#ffffff" stroke="#fde68a"/>
  <text x="86" y="520" font-size="13" font-weight="700" fill="#78350f">Vault — git · Markdown</text>
  <text x="86" y="537" font-size="10.5" font-weight="600" fill="#b45309">GOVERNED MEMORY (Obsidian-compatible)</text>
  <text x="86" y="560" font-size="11" fill="#b45309">decisions/ — blackbox, append-only</text>
  <text x="86" y="579" font-size="11" fill="#b45309">skills/ · knowledge/ — human-gated</text>
  <text x="86" y="598" font-size="11" fill="#b45309">proposed/ — audit drafts</text>
  <text x="86" y="617" font-size="11" fill="#b45309">compass/ — audit reports</text>
  <line x1="86" y1="630" x2="306" y2="630" stroke="#fde68a"/>
  <text x="86" y="650" font-size="11" fill="#b45309">every write = git commit</text>
  <text x="86" y="669" font-size="11" font-weight="700" fill="#92400e">[blackbox] · [compass] · [human]</text>
  <text x="86" y="691" font-size="11" fill="#b45309">git revert = behavior rollback</text>
  <text x="86" y="708" font-size="10.5" fill="#a16207">(skills/knowledge only — records stay)</text>
  <text x="86" y="730" font-size="10.5" font-weight="600" fill="#92400e">behavior is revertible; history is not</text>

  <!-- The engine -->
  <text x="346" y="516" font-size="13.5" font-weight="700" fill="#78350f">The engine — constant comparative analysis ¹</text>

  <rect x="346" y="528" width="126" height="70" rx="8" fill="#fffbeb" stroke="#fbbf24"/>
  <text x="409" y="552" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400e">log_decision</text>
  <text x="409" y="570" text-anchor="middle" font-size="10" fill="#b45309">initial coding</text>
  <text x="409" y="585" text-anchor="middle" font-size="9.5" fill="#a16207">plan · cites · outcome</text>

  <path d="M472,563 L494,563" stroke="#b45309" stroke-width="1.5" marker-end="url(#arrm)"/>
  <rect x="496" y="528" width="150" height="70" rx="8" fill="#fffbeb" stroke="#fbbf24"/>
  <text x="571" y="552" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400e">run_audit</text>
  <text x="571" y="570" text-anchor="middle" font-size="10" fill="#b45309">constant comparison</text>
  <text x="571" y="585" text-anchor="middle" font-size="9.5" fill="#a16207">uncited · stale · low-conf</text>

  <path d="M646,563 L668,563" stroke="#b45309" stroke-width="1.5" marker-end="url(#arrm)"/>
  <rect x="670" y="528" width="142" height="70" rx="8" fill="#fffbeb" stroke="#fbbf24"/>
  <text x="741" y="552" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400e">proposal</text>
  <text x="741" y="570" text-anchor="middle" font-size="10" fill="#b45309">memo + category</text>
  <text x="741" y="585" text-anchor="middle" font-size="9.5" fill="#a16207">from real vault content</text>

  <path d="M812,563 L834,563" stroke="#db2777" stroke-width="1.5" marker-end="url(#arrp)"/>
  <rect x="836" y="525" width="136" height="76" rx="8" fill="#fce7f3" stroke="#db2777"/>
  <text x="904" y="549" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9d174d">Fit · Work</text>
  <text x="904" y="567" text-anchor="middle" font-size="9.5" fill="#be185d">acceptance tests</text>
  <text x="904" y="581" text-anchor="middle" font-size="9" fill="#be185d">fit: arises from data</text>
  <text x="904" y="593" text-anchor="middle" font-size="9" fill="#be185d">work: changes behavior</text>

  <!-- gate down to promote -->
  <path d="M904,601 L904,624" stroke="#b45309" stroke-width="1.5" marker-end="url(#arrm)"/>
  <rect x="742" y="626" width="172" height="64" rx="8" fill="#fffbeb" stroke="#fbbf24"/>
  <text x="828" y="650" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400e">approve → promote</text>
  <text x="828" y="668" text-anchor="middle" font-size="10" fill="#b45309">theoretical saturation</text>
  <text x="828" y="683" text-anchor="middle" font-size="9.5" fill="#a16207">category → active skill</text>

  <!-- promote feeds back to vault skills -->
  <path d="M742,658 L324,640" stroke="#16a34a" stroke-width="1.6" marker-end="url(#arr)" fill="none"/>
  <text x="470" y="635" font-size="10" fill="#15803d">promoted skill → active → feeds recall</text>

  <!-- decision-record callout: the seam in one artifact -->
  <rect x="346" y="704" width="626" height="86" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-dasharray="4 4"/>
  <text x="362" y="726" font-size="11.5" font-weight="700" fill="#334155">One decision · four citations — the seam, in a single artifact</text>
  <text x="362" y="747" font-size="10.5" fill="#4f46e5">[iq: vendor-master]  ·  [work: finance-thread]  ·  [fabric: PaymentTerm → requires-approval]</text>
  <text x="362" y="765" font-size="10.5" fill="#b45309">[vault: skill-vendor-triage, kn-payment-policy]   →   outcome: needs_human</text>
  <text x="362" y="783" font-size="10" fill="#64748b">three grounding lenses (rented) + one governed-memory cite (owned) — never merged</text>

  <text x="74" y="816" font-size="10" fill="#a16207">¹ Glaser &amp; Strauss, The Discovery of Grounded Theory (1967): constant comparison · acceptance tests fit &amp; work · theoretical saturation.</text>

  <!-- ============ Human gate ============ -->
  <rect x="1015" y="454" width="135" height="476" rx="12" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="1082" y="486" text-anchor="middle" font-size="14.5" font-weight="700" fill="#9d174d">Human</text>
  <text x="1082" y="505" text-anchor="middle" font-size="11.5" fill="#be185d">the operator</text>
  <text x="1082" y="548" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9d174d">THE GATE</text>
  <text x="1082" y="572" text-anchor="middle" font-size="11" fill="#be185d">approve / promote</text>
  <text x="1082" y="590" text-anchor="middle" font-size="11" fill="#be185d">reject</text>
  <text x="1082" y="608" text-anchor="middle" font-size="11" fill="#be185d">revert</text>
  <text x="1082" y="648" text-anchor="middle" font-size="11" font-weight="600" fill="#9d174d">applies Fit · Work</text>
  <text x="1082" y="690" text-anchor="middle" font-size="11" fill="#be185d">reads the vault</text>
  <text x="1082" y="706" text-anchor="middle" font-size="11" fill="#be185d">in Obsidian</text>
  <text x="1082" y="724" text-anchor="middle" font-size="11" fill="#be185d">(live graph)</text>
  <!-- human into the Fit/Work gate -->
  <path d="M1015,563 L974,563" stroke="#db2777" stroke-width="1.5" marker-end="url(#arrp)"/>
  <text x="1006" y="556" text-anchor="end" font-size="9.5" fill="#9d174d">human gate</text>

  <text x="600" y="965" text-anchor="middle" font-size="11.5" fill="#94a3b8">Agents League @ AI Skills Fest 2026 · Reasoning Agents track · Jeremy Gracey</text>
</svg>
