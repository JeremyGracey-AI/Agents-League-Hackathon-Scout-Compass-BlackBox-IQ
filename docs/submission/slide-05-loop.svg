<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1920 1080" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs><radialGradient id="bg5" cx="78%" cy="-10%" r="95%"><stop offset="0%" stop-color="#16224a"/><stop offset="56%" stop-color="#0a0e1a"/></radialGradient>
    <marker id="ar5" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker></defs>
  <rect width="1920" height="1080" fill="url(#bg5)"/>
  <image xlink:href="compass-logo.png" x="160" y="96" width="54" height="54"/>
  <text x="230" y="133" font-size="22" font-weight="600" fill="#93a2be">Compass-BlackBox IQ</text>

  <text x="160" y="262" font-size="56" font-weight="750" fill="#ffffff">The governed loop</text>
  <text x="160" y="318" font-size="27" fill="#aab6d6">Plan → recall → act → log → audit → propose → <tspan fill="#f9a8d4" font-weight="700">human approve</tspan> → improved re-run.</text>

  <g font-size="20" font-weight="600" text-anchor="middle">
    <rect x="160" y="430" width="200" height="92" rx="12" fill="#101a2e" stroke="#1d2840"/><text x="260" y="470" fill="#e8eef9">recall_knowledge</text><text x="260" y="498" font-size="15" fill="#7fb0ff">what do I already know?</text>
    <path d="M360,476 L406,476" stroke="#64748b" stroke-width="2" marker-end="url(#ar5)"/>
    <rect x="408" y="430" width="200" height="92" rx="12" fill="#101a2e" stroke="#1d2840"/><text x="508" y="470" fill="#e8eef9">act + ground</text><text x="508" y="498" font-size="15" fill="#7fb0ff">F.A.M. grounding</text>
    <path d="M608,476 L654,476" stroke="#64748b" stroke-width="2" marker-end="url(#ar5)"/>
    <rect x="656" y="430" width="200" height="92" rx="12" fill="#1a1407" stroke="#7a5a12"/><text x="756" y="470" fill="#fcd34d">log_decision</text><text x="756" y="498" font-size="15" fill="#a98c4e">[blackbox] · cited</text>
    <path d="M856,476 L902,476" stroke="#64748b" stroke-width="2" marker-end="url(#ar5)"/>
    <rect x="904" y="430" width="200" height="92" rx="12" fill="#101a2e" stroke="#3b82f6"/><text x="1004" y="470" fill="#93c5fd">run_audit</text><text x="1004" y="498" font-size="15" fill="#7fb0ff">3 heuristics</text>
    <path d="M1104,476 L1150,476" stroke="#64748b" stroke-width="2" marker-end="url(#ar5)"/>
    <rect x="1152" y="430" width="200" height="92" rx="12" fill="#101a2e" stroke="#3b82f6"/><text x="1252" y="470" fill="#93c5fd">proposal</text><text x="1252" y="498" font-size="15" fill="#7fb0ff">drafted from real notes</text>
    <path d="M1352,476 L1398,476" stroke="#db2777" stroke-width="2" marker-end="url(#ar5)"/>
    <rect x="1400" y="424" width="208" height="104" rx="12" fill="#1f0f1a" stroke="#db2777" stroke-width="2"/><text x="1504" y="466" fill="#f9a8d4">HUMAN GATE</text><text x="1504" y="494" font-size="15" fill="#f9a8d4">approve · reject · revert</text><text x="1504" y="514" font-size="13" fill="#c98aa8">fit · work</text>
  </g>
  <!-- promote feedback -->
  <path d="M1450,528 C1450,610 260,610 260,524" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#ar5)"/>
  <text x="855" y="600" text-anchor="middle" font-size="17" fill="#15803d">approved skill → active → changes the next run</text>

  <text x="160" y="730" font-size="27" fill="#cdd9f0">The improvement step is itself reasoning you can read: the audit's proposal cites the exact</text>
  <text x="160" y="768" font-size="27" fill="#cdd9f0">notes the agent overlooked — derived from real vault content, never invented.</text>

  <rect x="160" y="824" width="1600" height="70" rx="12" fill="#10182c" stroke="#26324f"/>
  <text x="190" y="868" font-size="24" font-weight="700" fill="#fff">Agents propose; humans promote. Behavior is revertible; history is not.</text>

  <text x="1760" y="1000" text-anchor="end" font-size="17" fill="#5d6c8d">05</text>
</svg>
