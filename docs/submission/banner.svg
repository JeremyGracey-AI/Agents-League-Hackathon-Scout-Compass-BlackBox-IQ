<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1600 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bbg" cx="68%" cy="0%" r="110%"><stop offset="0%" stop-color="#16224a"/><stop offset="58%" stop-color="#0a0e1a"/></radialGradient>
  </defs>
  <rect width="1600" height="460" fill="url(#bbg)"/>
  <rect x="0" y="457" width="1600" height="3" fill="#1d2840"/>

  <!-- brand: logo + name -->
  <image xlink:href="compass-logo.png" x="74" y="128" width="184" height="184"/>
  <text x="300" y="202" font-size="58" font-weight="750" fill="#ffffff">Compass-BlackBox IQ</text>
  <text x="302" y="252" font-size="26" fill="#aab6d6">The governance layer for an agent's <tspan fill="#fff" font-weight="600">memory &amp; competence</tspan>.</text>
  <text x="302" y="291" font-size="19" fill="#7f8db0">Grounded on Microsoft's F.A.M. intelligence layer · owned by the human · in plain text.</text>

  <!-- credibility pills -->
  <g font-size="14" font-weight="600">
    <rect x="302" y="322" width="208" height="34" rx="17" fill="#101a2e" stroke="#2c3a5e"/><text x="406" y="344" text-anchor="middle" fill="#9fd8cd">3 Microsoft IQ surfaces</text>
    <rect x="524" y="322" width="136" height="34" rx="17" fill="#101a2e" stroke="#2c3a5e"/><text x="592" y="344" text-anchor="middle" fill="#cdd9f0">governed loop</text>
    <rect x="674" y="322" width="122" height="34" rx="17" fill="#101a2e" stroke="#2c3a5e"/><text x="735" y="344" text-anchor="middle" fill="#cdd9f0">human-gated</text>
  </g>

  <!-- F.A.M. -> governed vault motif -->
  <!-- traces: three IQ surfaces triangulate at the seam -->
  <path d="M1104,150 C1230,150 1290,228 1408,228" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M1104,230 L1408,228" stroke="#16c2a3" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M1104,310 C1230,310 1290,228 1408,228" stroke="#9871f0" stroke-width="2" fill="none" opacity="0.7"/>
  <circle cx="1256" cy="178" r="3" fill="#3b82f6"/><circle cx="1300" cy="229" r="3" fill="#16c2a3"/><circle cx="1256" cy="278" r="3" fill="#9871f0"/>
  <circle cx="1408" cy="228" r="4" fill="#101a2e" stroke="#4a5a7e" stroke-width="1.5"/>

  <!-- F.A.M. nodes -->
  <circle cx="1090" cy="150" r="11" fill="#0a0e1a" stroke="#3b82f6" stroke-width="3"/><text x="1072" y="156" text-anchor="end" font-size="16" font-weight="600" fill="#93c5fd">Facts</text><text x="1072" y="175" text-anchor="end" font-size="11" fill="#5d6c8d">Foundry IQ</text>
  <circle cx="1090" cy="230" r="11" fill="#0a0e1a" stroke="#16c2a3" stroke-width="3"/><text x="1072" y="236" text-anchor="end" font-size="16" font-weight="600" fill="#5eead4">Activity</text><text x="1072" y="255" text-anchor="end" font-size="11" fill="#5d6c8d">Work IQ</text>
  <circle cx="1090" cy="310" r="11" fill="#0a0e1a" stroke="#9871f0" stroke-width="3"/><text x="1072" y="316" text-anchor="end" font-size="16" font-weight="600" fill="#c4b5fd">Meaning</text><text x="1072" y="335" text-anchor="end" font-size="11" fill="#5d6c8d">Fabric IQ</text>

  <!-- seam: grounding reaches it, never crosses -->
  <line x1="1408" y1="118" x2="1408" y2="344" stroke="#26324f" stroke-dasharray="5 5"/>
  <text x="1402" y="110" text-anchor="end" font-size="11" fill="#5d6c8d">SEAM · never merged</text>

  <!-- governed vault: a vault-door outline -->
  <g>
    <rect x="1432" y="186" width="84" height="84" rx="16" fill="#1c1407" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="1474" cy="228" r="30" fill="#0a0e1a" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="1474" cy="228" r="22" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.45"/>
    <g stroke="#f59e0b" stroke-width="2" stroke-linecap="round">
      <line x1="1450" y1="228" x2="1498" y2="228"/>
      <line x1="1462" y1="207" x2="1486" y2="249"/>
      <line x1="1486" y1="207" x2="1462" y2="249"/>
    </g>
    <circle cx="1474" cy="228" r="6.5" fill="#f59e0b"/>
    <g fill="#f59e0b">
      <circle cx="1448" cy="202" r="2.5"/><circle cx="1500" cy="202" r="2.5"/><circle cx="1448" cy="254" r="2.5"/><circle cx="1500" cy="254" r="2.5"/>
    </g>
  </g>
  <text x="1474" y="296" text-anchor="middle" font-size="18" font-weight="700" fill="#fcd34d">governed vault</text>
  <text x="1474" y="316" text-anchor="middle" font-size="11.5" fill="#a98c4e">git · human-gated · revertible</text>
  <text x="1440" y="339" text-anchor="middle" font-size="11.5" fill="#5d6c8d">grounding is rented · memory is owned</text>
</svg>
