<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1920 1080" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs><radialGradient id="bg6" cx="78%" cy="-10%" r="95%"><stop offset="0%" stop-color="#16224a"/><stop offset="56%" stop-color="#0a0e1a"/></radialGradient></defs>
  <rect width="1920" height="1080" fill="url(#bg6)"/>
  <image xlink:href="compass-vault.png" x="160" y="96" width="54" height="54"/>
  <text x="230" y="133" font-size="22" font-weight="600" fill="#93a2be">Compass-BlackBox IQ</text>

  <text x="160" y="262" font-size="56" font-weight="750" fill="#ffffff">Competence is a method, not a metaphor</text>
  <text x="160" y="318" font-size="27" fill="#aab6d6">F.A.M. is the grounded truth. <tspan fill="#fff">Memory &amp; competence</tspan> are measured with grounded theory's <tspan fill="#fff">constant comparative analysis.</tspan></text>

  <!-- mapping -->
  <g font-size="22">
    <text x="160" y="400" font-size="18" font-weight="700" fill="#5d6c8d">GROUNDED THEORY</text>
    <text x="980" y="400" font-size="18" font-weight="700" fill="#5d6c8d">COMPASS-BLACKBOX IQ</text>
    <line x1="160" y1="416" x2="1760" y2="416" stroke="#1d2840"/>
    <g fill="#cfd8ec">
      <text x="160" y="464">Initial coding</text><text x="980" y="464" font-family="ui-monospace,Menlo,monospace" fill="#fcd34d">log_decision</text>
      <text x="160" y="514">Constant comparison</text><text x="980" y="514" font-family="ui-monospace,Menlo,monospace" fill="#93c5fd">run_audit  (uncited · stale · low-confidence)</text>
      <text x="160" y="564">Theoretical sampling</text><text x="980" y="564" fill="#aeb9d6" font-size="20">audit re-runs recall over the task</text>
      <text x="160" y="614">Memo + category</text><text x="980" y="614" fill="#aeb9d6" font-size="20">the proposal (drafted from real notes) → a skill</text>
      <text x="160" y="664" fill="#f9a8d4" font-weight="700">Acceptance: fit + work</text><text x="980" y="664" fill="#f9a8d4">the human gate — approve_proposal</text>
      <text x="160" y="714">Theoretical saturation</text><text x="980" y="714" fill="#aeb9d6" font-size="20">promotion; behavior revertible, record append-only</text>
    </g>
  </g>

  <rect x="160" y="772" width="784" height="150" rx="14" fill="#101a2e" stroke="#1d2840"/>
  <text x="190" y="816" font-size="23" font-weight="700" fill="#f9a8d4">Fit</text>
  <text x="240" y="816" font-size="20" fill="#cfd8ec">— a skill must <tspan fill="#fff">arise from</tspan> the decisions that produced it</text>
  <text x="190" y="852" font-size="17" fill="#93a2be">(the audit drafts from real vault content — never invented)</text>
  <text x="190" y="900" font-size="17" fill="#5d6c8d">Glaser &amp; Strauss, The Discovery of Grounded Theory, 1967</text>

  <rect x="976" y="772" width="784" height="150" rx="14" fill="#101a2e" stroke="#1d2840"/>
  <text x="1006" y="816" font-size="23" font-weight="700" fill="#5eead4">Work</text>
  <text x="1078" y="816" font-size="20" fill="#cfd8ec">— it must <tspan fill="#fff">change behavior</tspan></text>
  <text x="1006" y="852" font-size="17" fill="#93a2be">(the governed re-run follows it and reaches the right outcome — or it's reverted)</text>

  <text x="160" y="990" font-size="24" fill="#cdd9f0">F.A.M. grounds the agent in the world; the engine turns its behavior into <tspan fill="#fff" font-weight="700">governed, human-approved competence.</tspan></text>
  <text x="1760" y="1020" text-anchor="end" font-size="17" fill="#5d6c8d">06</text>
</svg>
