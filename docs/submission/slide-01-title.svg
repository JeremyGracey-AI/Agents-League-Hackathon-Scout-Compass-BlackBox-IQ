<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1920 1080" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg" cx="72%" cy="-8%" r="90%">
      <stop offset="0%" stop-color="#16224a"/><stop offset="55%" stop-color="#0a0e1a"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <image xlink:href="compass-logo.png" x="160" y="150" width="150" height="150"/>
  <text x="338" y="222" font-size="34" font-weight="700" fill="#e8eef9">Compass-BlackBox IQ</text>
  <text x="338" y="266" font-size="19" fill="#93a2be">Agents League @ AI Skills Fest 2026 · Reasoning Agents track</text>

  <text x="160" y="470" font-size="78" font-weight="750" fill="#ffffff">The flight recorder for</text>
  <text x="160" y="560" font-size="78" font-weight="750" fill="#ffffff">autonomous agents.</text>
  <text x="160" y="640" font-size="30" fill="#aab6d6">Agent memory &amp; competence — in plain text, under git, owned by the human.</text>

  <rect x="160" y="712" width="1080" height="2" fill="#1d2840"/>
  <text x="160" y="772" font-size="25" fill="#cdd9f0">Microsoft governs an autonomous agent's <tspan fill="#7fb0ff">permissions, actions &amp; grounding.</tspan></text>
  <text x="160" y="814" font-size="25" fill="#cdd9f0">Compass-BlackBox IQ governs the layer no one else does — <tspan fill="#fff" font-weight="700">memory &amp; competence.</tspan></text>

  <g font-size="18" font-weight="600">
    <rect x="160" y="876" width="232" height="48" rx="24" fill="#101a2e" stroke="#2c3a5e"/><text x="276" y="906" text-anchor="middle" fill="#9fd8cd">3 Microsoft IQ surfaces</text>
    <rect x="404" y="876" width="180" height="48" rx="24" fill="#101a2e" stroke="#2c3a5e"/><text x="494" y="906" text-anchor="middle" fill="#cdd9f0">governed loop</text>
    <rect x="596" y="876" width="168" height="48" rx="24" fill="#101a2e" stroke="#2c3a5e"/><text x="680" y="906" text-anchor="middle" fill="#cdd9f0">human-gated</text>
    <rect x="776" y="876" width="158" height="48" rx="24" fill="#101a2e" stroke="#2c3a5e"/><text x="855" y="906" text-anchor="middle" fill="#cdd9f0">auth-gated</text>
    <rect x="946" y="876" width="118" height="48" rx="24" fill="#101a2e" stroke="#2c3a5e"/><text x="1005" y="906" text-anchor="middle" fill="#cdd9f0">tested</text>
  </g>

  <text x="160" y="1000" font-size="18" fill="#5d6c8d">Built solo by Jeremy Gracey · github.com/JeremyGracey-AI/Agents-League-Hackathon-Compass-BlackBox-IQ</text>
</svg>
