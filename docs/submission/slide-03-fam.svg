<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1920 1080" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs><radialGradient id="bg3" cx="78%" cy="-10%" r="95%"><stop offset="0%" stop-color="#16224a"/><stop offset="56%" stop-color="#0a0e1a"/></radialGradient></defs>
  <rect width="1920" height="1080" fill="url(#bg3)"/>
  <image xlink:href="compass-vault.png" x="160" y="96" width="54" height="54"/>
  <text x="230" y="133" font-size="22" font-weight="600" fill="#93a2be">Compass-BlackBox IQ</text>

  <text x="160" y="262" font-size="56" font-weight="750" fill="#ffffff">F.A.M. — Facts · Activity · Meaning</text>
  <text x="160" y="318" font-size="27" fill="#aab6d6">Microsoft's intelligence layer, as three lenses on the enterprise world. Each does a job the others can't.</text>

  <!-- grounding band: 3 lenses -->
  <g>
    <rect x="160" y="384" width="500" height="240" rx="16" fill="#101a2e" stroke="#1d2840"/>
    <circle cx="196" cy="428" r="8" fill="#3b82f6"/><text x="222" y="436" font-size="27" font-weight="700" fill="#e8eef9">Foundry IQ</text>
    <text x="640" y="436" text-anchor="end" font-size="16" font-weight="700" fill="#5d6c8d">FACTS</text>
    <text x="186" y="486" font-size="20" fill="#aeb9d6">Institutional reference — who / what:</text>
    <text x="186" y="516" font-size="20" fill="#aeb9d6">vendor master · org directory · handbook</text>
    <text x="186" y="566" font-size="17" fill="#7fb0ff">[iq:] · Azure AI Search KB</text>
    <rect x="186" y="586" width="86" height="30" rx="15" fill="rgba(22,194,163,.16)"/><text x="229" y="607" text-anchor="middle" font-size="15" font-weight="700" fill="#5eead4">LIVE</text>

    <rect x="710" y="384" width="500" height="240" rx="16" fill="#101a2e" stroke="#1d2840"/>
    <circle cx="746" cy="428" r="8" fill="#16c2a3"/><text x="772" y="436" font-size="27" font-weight="700" fill="#e8eef9">Work IQ</text>
    <text x="1190" y="436" text-anchor="end" font-size="16" font-weight="700" fill="#5d6c8d">ACTIVITY</text>
    <text x="736" y="486" font-size="20" fill="#aeb9d6">Live Microsoft 365 — what's happening:</text>
    <text x="736" y="516" font-size="20" fill="#aeb9d6">people · meetings · mail, this week</text>
    <text x="736" y="566" font-size="17" fill="#5eead4">[work:] · M365 Copilot Gateway</text>
    <rect x="736" y="586" width="86" height="30" rx="15" fill="rgba(22,194,163,.16)"/><text x="779" y="607" text-anchor="middle" font-size="15" font-weight="700" fill="#5eead4">LIVE</text>

    <rect x="1260" y="384" width="500" height="240" rx="16" fill="#101a2e" stroke="#1d2840"/>
    <circle cx="1296" cy="428" r="8" fill="#9871f0"/><text x="1322" y="436" font-size="27" font-weight="700" fill="#e8eef9">Fabric IQ</text>
    <text x="1740" y="436" text-anchor="end" font-size="16" font-weight="700" fill="#5d6c8d">MEANING</text>
    <text x="1286" y="486" font-size="20" fill="#aeb9d6">The ontology — how concepts relate:</text>
    <text x="1286" y="516" font-size="20" fill="#aeb9d6">net-60 is-a deviation → requires approval</text>
    <text x="1286" y="566" font-size="17" fill="#c4b5fd">[fabric:] · RDF/OWL ontology</text>
    <rect x="1286" y="586" width="130" height="30" rx="15" fill="rgba(152,113,240,.16)"/><text x="1351" y="607" text-anchor="middle" font-size="15" font-weight="700" fill="#c4b5fd">ROADMAP</text>
  </g>

  <!-- seam -->
  <line x1="160" y1="688" x2="1760" y2="688" stroke="#1d2840" stroke-dasharray="6 6"/>
  <text x="160" y="676" font-size="17" font-weight="600" fill="#7fb0ff">▲ grounding — rented · read-only · never merged</text>
  <text x="1760" y="676" text-anchor="end" font-size="17" font-weight="600" fill="#fcd34d">governed memory — owned · revertible ▼</text>

  <!-- vault -->
  <rect x="160" y="712" width="1600" height="150" rx="16" fill="#1a1407" stroke="#7a5a12"/>
  <circle cx="200" cy="760" r="8" fill="#f5a524"/><text x="226" y="768" font-size="27" font-weight="700" fill="#fcd34d">Vault — governed memory</text>
  <text x="1740" y="768" text-anchor="end" font-size="16" font-weight="700" fill="#a98c4e">OWNED · [vault:]</text>
  <text x="200" y="812" font-size="21" fill="#e8d6a8">The agent's decisions, skills, and knowledge as Markdown in a git repo the human owns.</text>
  <text x="200" y="844" font-size="21" fill="#e8d6a8">Grounding feeds the agent; it is never the agent's memory.</text>

  <text x="160" y="940" font-size="26" fill="#cdd9f0">Three lenses converge on one decision — facts + activity + meaning + governed memory,</text>
  <text x="160" y="978" font-size="26" fill="#cdd9f0">each in its own lane. <tspan fill="#fff" font-weight="700">The seam is the thesis.</tspan></text>

  <text x="1760" y="1010" text-anchor="end" font-size="17" fill="#5d6c8d">03</text>
</svg>
