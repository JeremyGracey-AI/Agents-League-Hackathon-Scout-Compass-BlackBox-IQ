<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1920 1080" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs><radialGradient id="bg7" cx="78%" cy="-10%" r="95%"><stop offset="0%" stop-color="#16224a"/><stop offset="56%" stop-color="#0a0e1a"/></radialGradient></defs>
  <rect width="1920" height="1080" fill="url(#bg7)"/>
  <image xlink:href="compass-logo.png" x="160" y="96" width="54" height="54"/>
  <text x="230" y="133" font-size="22" font-weight="600" fill="#93a2be">Compass-BlackBox IQ</text>

  <text x="160" y="262" font-size="56" font-weight="750" fill="#ffffff">One repo, three layers</text>
  <text x="160" y="318" font-size="27" fill="#aab6d6">The full skill lifecycle — same principle end to end: humans approve what agents propose.</text>

  <g>
    <rect x="160" y="384" width="1600" height="158" rx="16" fill="#10162c" stroke="#6366f1"/>
    <text x="190" y="436" font-size="28" font-weight="700" fill="#a5b4fc">1 · Compass Rose</text>
    <text x="190" y="476" font-size="21" fill="#aab6d6">Direction &amp; skill alignment — build role-aligned skills (CLI + 8 executive archetypes),</text>
    <text x="190" y="508" font-size="21" fill="#aab6d6">plus the GM Louis no-YAML web app: persona → preview → one-click install.</text>
    <text x="1730" y="436" text-anchor="end" font-size="17" fill="#6366f1">compass-rose/</text>

    <rect x="160" y="558" width="1600" height="158" rx="16" fill="#0c1f1a" stroke="#10b981"/>
    <text x="190" y="610" font-size="28" font-weight="700" fill="#6ee7b7">2 · GM Louis</text>
    <text x="190" y="650" font-size="21" fill="#aab6d6">The reasoning agent (Microsoft Foundry) + the human-facing dashboard —</text>
    <text x="190" y="682" font-size="21" fill="#aab6d6">multi-step reasoning over F.A.M. grounding and governed memory, via MCP. Freelance GM = the ungoverned "before".</text>
    <text x="1730" y="610" text-anchor="end" font-size="17" fill="#10b981">agent/ · compass-rose/web/</text>

    <rect x="160" y="732" width="1600" height="158" rx="16" fill="#1c1407" stroke="#f59e0b"/>
    <text x="190" y="784" font-size="28" font-weight="700" fill="#fcd34d">3 · BlackBox IQ (GGR)</text>
    <text x="190" y="824" font-size="21" fill="#e8d6a8">Governance · Grounding · Recorder — the MCP server + the git vault. Enforces the invariant,</text>
    <text x="190" y="856" font-size="21" fill="#e8d6a8">grounds on F.A.M., and records every decision (the blackbox + audit + human-gated promotion).</text>
    <text x="1730" y="784" text-anchor="end" font-size="17" fill="#f59e0b">server/ · demo/</text>
  </g>

  <text x="160" y="970" font-size="24" fill="#cdd9f0">Framework-agnostic and open source — it <tspan fill="#fff" font-weight="700">consumes</tspan> Microsoft's trust stack rather than duplicating it.</text>
  <text x="1760" y="1010" text-anchor="end" font-size="17" fill="#5d6c8d">07</text>
</svg>
