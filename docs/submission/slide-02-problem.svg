<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1920 1080" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs><radialGradient id="bg2" cx="78%" cy="-10%" r="95%"><stop offset="0%" stop-color="#16224a"/><stop offset="56%" stop-color="#0a0e1a"/></radialGradient></defs>
  <rect width="1920" height="1080" fill="url(#bg2)"/>
  <image xlink:href="compass-logo.png" x="160" y="96" width="54" height="54"/>
  <text x="230" y="133" font-size="22" font-weight="600" fill="#93a2be">Compass-BlackBox IQ</text>

  <text x="160" y="280" font-size="58" font-weight="750" fill="#ffffff">Who governs what your agent knows?</text>
  <text x="160" y="346" font-size="27" fill="#aab6d6">When an agent makes a bad call, permission systems tell you it was <tspan fill="#fff">allowed</tspan> — not <tspan fill="#fff">why it happened.</tspan></text>
  <text x="160" y="386" font-size="27" fill="#aab6d6">And when agents "learn," that learning is invisible — buried in vendor memory you can't read, diff, or revoke.</text>

  <g>
    <rect x="160" y="470" width="1600" height="86" rx="12" fill="#0f1730" stroke="#1d2840"/>
    <text x="190" y="522" font-size="24" font-weight="700" fill="#cfd8ec">Permissions &amp; security</text>
    <text x="700" y="522" font-size="21" fill="#93a2be">identity · policy · who/what an agent may touch</text>
    <text x="1730" y="522" text-anchor="end" font-size="20" fill="#7fb0ff">Agent 365</text>

    <rect x="160" y="566" width="1600" height="86" rx="12" fill="#0f1730" stroke="#1d2840"/>
    <text x="190" y="618" font-size="24" font-weight="700" fill="#cfd8ec">Actions</text>
    <text x="700" y="618" font-size="21" fill="#93a2be">approve / block / pause · spend caps · tool limits</text>
    <text x="1730" y="618" text-anchor="end" font-size="20" fill="#7fb0ff">orchestration platforms</text>

    <rect x="160" y="662" width="1600" height="98" rx="12" fill="#1a1407" stroke="#7a5a12" stroke-width="2"/>
    <text x="190" y="708" font-size="25" font-weight="800" fill="#fcd34d">Memory &amp; competence</text>
    <text x="700" y="708" font-size="21" fill="#e8d6a8">what it knows, did, and learned — and who approved it</text>
    <text x="1730" y="708" text-anchor="end" font-size="22" font-weight="800" fill="#fcd34d">no control plane</text>
    <text x="190" y="740" font-size="17" fill="#a98c4e">the layer this project governs</text>
  </g>

  <text x="160" y="860" font-size="27" fill="#cdd9f0">Three layers govern an autonomous agent. The third — what it knows, did, and learned — is the one</text>
  <text x="160" y="900" font-size="27" fill="#cdd9f0">no one else touches. <tspan fill="#fff" font-weight="700">That's the layer Compass-BlackBox IQ governs.</tspan></text>

  <text x="160" y="1000" font-size="17" fill="#5d6c8d">Agents League @ AI Skills Fest 2026 · Reasoning Agents track · Jeremy Gracey</text>
  <text x="1760" y="1000" text-anchor="end" font-size="17" fill="#5d6c8d">02</text>
</svg>
